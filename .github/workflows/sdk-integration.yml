name: Full MASONODE SDK Integration Test

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to trigger this manually from your phone

jobs:
  test-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Secure Install
        # Installs all dependencies for all workspaces at once
        run: npm install --ignore-scripts

      - name: Run All Tests
        run: |
          # The --if-present flag ensures it doesn't crash on empty examples
          # --workspaces (or -ws) tells npm to run the command in every sub-package
          npm test --workspaces --if-present
