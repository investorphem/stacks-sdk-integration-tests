name: Stacks SDK Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours

jobs:
  test-examples:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22] # Using current LTS versions
        project: [example1, example2, example3, example4, example5]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Secure Install (All Workspaces)
        run: |
          # --ignore-scripts is CRITICAL: it prevents the axios RAT from executing
          npm install --ignore-scripts

      - name: Malware Audit
        run: |
          # Specifically check for the compromised Axios versions and the plain-crypto-js dropper
          if npm ls axios | grep -E "1\.14\.1|0\.30\.4" || npm ls plain-crypto-js; then
            echo "🚨 SECURITY ALERT: Compromised Axios or Malware Dropper detected in workspaces!"
            exit 1
          else
            echo "✅ No known malicious packages found."
          fi

      - name: Run Test for ${{ matrix.project }}
        run: |
          # Leverage workspaces to run tests without manual 'cd'
          npm test -w ${{ matrix.project }}
