name: Full MASONODE SDK Integration Test

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  test-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Secure Install
        # --ignore-scripts is your shield against the axios malware
        run: npm install --ignore-scripts

      - name: Run All Tests
        run: |
          # Only run tests for workspaces that actually have an index.js
          # This prevents the "MODULE_NOT_FOUND" errors for empty examples
          for dir in examples/*; do
            if [ -f "$dir/index.js" ]; then
              echo "🚀 Testing Workspace: $dir"
              npm test -w "$dir"
            else
              echo "⏩ Skipping empty workspace: $dir"
            fi
          done
