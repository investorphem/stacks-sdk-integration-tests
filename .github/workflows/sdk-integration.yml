name: Stacks SDK Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours

jobs:
  test-examples:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 21]
        project: [example1, example2, example3, example4, example5]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Caching is disabled here because you're on mobile and 
          # haven't committed a package-lock.json yet.
          # Once you commit one, you can re-enable 'cache: npm'

      - name: Install All Workspace Dependencies
        run: |
          # Running install at the root handles all examples at once 
          # thanks to your "workspaces" config. 
          # --ignore-scripts blocks the axios malware from running.
          npm install --ignore-scripts

      - name: Verify Versions
        run: |
          # This verifies exactly which version of axios was installed 
          # across your workspaces.
          npm list axios --all

      - name: Run Test for ${{ matrix.project }}
        run: |
          # Uses the npm workspace command to run tests for specific projects
          npm test -w ${{ matrix.project }}
