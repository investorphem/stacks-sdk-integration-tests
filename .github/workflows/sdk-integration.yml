name: Stacks SDK Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours

jobs:
  test-examples:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 21]
        project: [example1, example2, example3, example4, example5]

    steps:
      # Updated to verified v4 tags to resolve the resolution error
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'examples/${{ matrix.project }}/package-lock.json'

      - name: Install SDKs
        run: |
          cd examples/${{ matrix.project }}
          # Use 'npm ci' to strictly follow your (sanitized) lockfile
          # and add --ignore-scripts to block any residual malicious post-installs
          npm ci --ignore-scripts 
          
      - name: Verify Versions
        run: |
          cd examples/${{ matrix.project }}
          # This verifies exactly which version of axios was installed
          npm list axios --depth=10
